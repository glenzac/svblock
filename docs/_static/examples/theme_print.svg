<svg xmlns="http://www.w3.org/2000/svg" width="321.1" height="211.5" viewBox="-0.75 -0.75 321.1 211.5" class="svblock">
    <style>
      :root {
      --sym-bg: #ffffff;
      --sym-border: #000000;
      --sym-text: #000000;
      --sym-pin-input: #000000;
      --sym-pin-output: #000000;
      --sym-pin-inout: #000000;
      --sym-pin-iface: #000000;
      --sym-group-bg: #ffffff;
      --sym-group-text: #000000;
      --sym-bus-stroke: 3;
      --sym-header-bg: #e0e0e0;
      --sym-param-text: #000000;
      }
      .svblock-box { fill: var(--sym-bg); stroke: var(--sym-border); stroke-width: 1.5; }
      .svblock-header { fill: var(--sym-header-bg); }
      .svblock-name { font-family: sans-serif; font-size: 15px; font-weight: bold; fill: var(--sym-text); }
      .svblock-param { font-family: monospace; font-size: 11px; fill: var(--sym-param-text); }
      .svblock-port { font-family: monospace; font-size: 13px; }
      .svblock-port-in { fill: var(--sym-pin-input); }
      .svblock-port-out { fill: var(--sym-pin-output); }
      .svblock-port-inout { fill: var(--sym-pin-inout); }
      .svblock-port-iface { fill: var(--sym-pin-iface); }
      .svblock-pin { stroke-width: 1.5; }
      .svblock-pin-bus { stroke-width: var(--sym-bus-stroke); }
      .svblock-group-sep { stroke: var(--sym-group-text); stroke-width: 0.5; stroke-dasharray: 4,2; }
      .svblock-group-label { font-family: sans-serif; font-size: 11px; fill: var(--sym-group-text); text-anchor: middle; }
    </style>
  <rect x="30" y="0" width="259.6" height="210" class="svblock-box"/>
  <rect x="30" y="0" width="259.6" height="36" class="svblock-header"/>
  <line x1="30" y1="36" x2="289.6" y2="36" stroke="var(--sym-border)" stroke-width="0.5"/>
  <text x="159.8" y="22" text-anchor="middle" class="svblock-name" id="module-clock_reset">clock_reset</text>
  <line x1="30" y1="76" x2="289.6" y2="76" class="svblock-group-sep" id="group-Resets"/>
  <text x="159.8" y="89" class="svblock-group-label">Resets</text>
  <line x1="30" y1="134" x2="289.6" y2="134" class="svblock-group-sep" id="group-Inputs"/>
  <text x="159.8" y="147" class="svblock-group-label">Inputs</text>
  <line x1="30" y1="172" x2="289.6" y2="172" class="svblock-group-sep" id="group-Outputs"/>
  <text x="159.8" y="185" class="svblock-group-label">Outputs</text>
  <line x1="0" y1="46" x2="30" y2="46" class="svblock-pin" stroke="svblock-port-in" id="port-clk"/>
  <text x="38" y="50" text-anchor="start" class="svblock-port svblock-port-in"><title>clk</title>clk</text>
  <polygon points="30,40 36,46 30,52" fill="none" stroke="currentColor" stroke-width="1"/>
  <line x1="0" y1="66" x2="30" y2="66" class="svblock-pin" stroke="svblock-port-in" id="port-sys_clk"/>
  <text x="38" y="70" text-anchor="start" class="svblock-port svblock-port-in"><title>sys_clk</title>sys_clk</text>
  <polygon points="30,60 36,66 30,72" fill="none" stroke="currentColor" stroke-width="1"/>
  <line x1="0" y1="104" x2="30" y2="104" class="svblock-pin" stroke="svblock-port-in" id="port-rst_n"/>
  <text x="38" y="108" text-anchor="start" class="svblock-port svblock-port-in"><title>rst_n</title>rst_n</text>
  <circle cx="27" cy="104" r="3" fill="var(--sym-bg)" stroke="currentColor" stroke-width="1"/>
  <line x1="0" y1="124" x2="30" y2="124" class="svblock-pin" stroke="svblock-port-in" id="port-reset"/>
  <text x="38" y="128" text-anchor="start" class="svblock-port svblock-port-in"><title>reset</title>reset</text>
  <line x1="0" y1="162" x2="30" y2="162" class="svblock-pin" stroke="svblock-port-in" id="port-data_in"/>
  <text x="38" y="166" text-anchor="start" class="svblock-port svblock-port-in"><title>data_in</title>data_in</text>
  <line x1="289.6" y1="200" x2="319.6" y2="200" class="svblock-pin" stroke="svblock-port-out" id="port-data_out"/>
  <text x="281.6" y="204" text-anchor="end" class="svblock-port svblock-port-out"><title>data_out</title>data_out</text>
</svg>