<svg xmlns="http://www.w3.org/2000/svg" width="500" height="290" viewBox="0 0 500 290">
    <style>
      :root {
      --sym-arrow: #a6adc8;
      --sym-instance-bg: #313244;
      --sym-instance-border: #cdd6f4;
      --sym-parent-border: #585b70;
      --sym-parent-bg: #1e1e2e;
      --sym-bg: #1e1e2e;
      --sym-border: #cdd6f4;
      --sym-text: #cdd6f4;
      --sym-pin-input: #89b4fa;
      --sym-pin-output: #f38ba8;
      --sym-pin-inout: #cba6f7;
      --sym-pin-iface: #a6e3a1;
      --sym-group-bg: #313244;
      --sym-group-text: #a6adc8;
      --sym-bus-stroke: 3;
      --sym-header-bg: #313244;
      --sym-param-text: #a6adc8;
      }
      .svblock-block-parent { fill: var(--sym-parent-bg); stroke: var(--sym-parent-border); stroke-width: 2; stroke-dasharray: 8,4; }
      .svblock-block-instance { fill: var(--sym-instance-bg); stroke: var(--sym-instance-border); stroke-width: 1.5; rx: 4; ry: 4; }
      .svblock-block-instance-label { font-family: sans-serif; font-size: 13px; fill: var(--sym-text); text-anchor: middle; dominant-baseline: central; }
      .svblock-block-module-label { font-family: monospace; font-size: 11px; fill: var(--sym-param-text); text-anchor: middle; dominant-baseline: central; }
      .svblock-block-parent-label { font-family: sans-serif; font-size: 16px; font-weight: bold; fill: var(--sym-text); }
      .svblock-block-arrow { stroke: var(--sym-arrow); fill: none; }
      .svblock-block-port-label { font-family: monospace; font-size: 12px; fill: var(--sym-text); }
      .svblock-block-port-line { stroke: var(--sym-arrow); stroke-width: 1.5; stroke-dasharray: 6,3; }
    </style>
    <defs>
      <marker id="arrow-end" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M0,0 L10,4 L0,8 Z" fill="#a6adc8"/>
      </marker>
      <marker id="arrow-start" markerWidth="10" markerHeight="8" refX="1" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M10,0 L0,4 L10,8 Z" fill="#a6adc8"/>
      </marker>
      <marker id="port-arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M0,0 L8,3 L0,6 Z" fill="#a6adc8"/>
      </marker>
    </defs>
    <rect class="svblock-block-parent" x="0" y="0" width="500" height="290" rx="6" ry="6"/>
    <text class="svblock-block-parent-label" x="12" y="20">top</text>
    <rect class="svblock-block-instance" id="inst-u_a" x="60" y="90" width="140" height="50"/>
    <text class="svblock-block-instance-label" x="130" y="108">u_a</text>
    <text class="svblock-block-module-label" x="130" y="124">mod_a</text>
    <rect class="svblock-block-instance" id="inst-u_b" x="60" y="180" width="140" height="50"/>
    <text class="svblock-block-instance-label" x="130" y="198">u_b</text>
    <text class="svblock-block-module-label" x="130" y="214">mod_b</text>
    <rect class="svblock-block-instance" id="inst-u_c" x="300" y="135" width="140" height="50"/>
    <text class="svblock-block-instance-label" x="370" y="153">u_c</text>
    <text class="svblock-block-module-label" x="370" y="169">mod_c</text>
    <line class="svblock-block-arrow" x1="200" y1="115" x2="300" y2="160" stroke-width="3" marker-end="url(#arrow-end)"/>
    <line class="svblock-block-arrow" x1="200" y1="205" x2="300" y2="160" stroke-width="3" marker-end="url(#arrow-end)"/>
</svg>