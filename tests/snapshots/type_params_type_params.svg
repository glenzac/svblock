<svg xmlns="http://www.w3.org/2000/svg" width="421.6" height="159.5" viewBox="-0.75 -0.75 421.6 159.5" class="svblock">
    <style>
      :root {
      --sym-bg: #ffffff;
      --sym-border: #333333;
      --sym-text: #111111;
      --sym-pin-input: #1a6db5;
      --sym-pin-output: #b52a1a;
      --sym-pin-inout: #6a2ab5;
      --sym-pin-iface: #1a9e55;
      --sym-group-bg: #f0f0f0;
      --sym-group-text: #555555;
      --sym-bus-stroke: 3;
      --sym-header-bg: #e8e8e8;
      --sym-param-text: #666666;
      }
      .svblock-box-fill { fill: var(--sym-bg); stroke: none; }
      .svblock-box-border { fill: none; stroke: var(--sym-border); stroke-width: 1.5; }
      .svblock-header { fill: var(--sym-header-bg); }
      .svblock-name { font-family: sans-serif; font-size: 15px; font-weight: bold; fill: var(--sym-text); }
      .svblock-param { font-family: monospace; font-size: 11px; fill: var(--sym-param-text); }
      .svblock-port { font-family: monospace; font-size: 13px; }
      .svblock-port-in { fill: var(--sym-pin-input); }
      .svblock-port-out { fill: var(--sym-pin-output); }
      .svblock-port-inout { fill: var(--sym-pin-inout); }
      .svblock-port-iface { fill: var(--sym-pin-iface); }
      .svblock-pin { stroke-width: 1.5; }
      .svblock-pin-bus { stroke-width: var(--sym-bus-stroke); }
      .svblock-group-sep { stroke: var(--sym-group-text); stroke-width: 0.5; stroke-dasharray: 4,2; }
      .svblock-group-label { font-family: sans-serif; font-size: 11px; fill: var(--sym-group-text); text-anchor: middle; }
    </style>
  <rect x="30" y="0" width="360.1" height="158" class="svblock-box-fill"/>
  <rect x="30" y="0" width="360.1" height="100" class="svblock-header"/>
  <line x1="30" y1="100" x2="390.1" y2="100" stroke="var(--sym-border)" stroke-width="0.5"/>
  <rect x="30" y="0" width="360.1" height="158" class="svblock-box-border"/>
  <text x="210.05" y="22" text-anchor="middle" class="svblock-name" id="module-type_params">type_params</text>
  <text x="210.05" y="36" text-anchor="middle" class="svblock-param" id="param-T">type T</text>
  <text x="210.05" y="52" text-anchor="middle" class="svblock-param" id="param-WIDTH">int WIDTH = 8</text>
  <text x="210.05" y="68" text-anchor="middle" class="svblock-param" id="param-NAME">string NAME</text>
  <text x="210.05" y="84" text-anchor="middle" class="svblock-param" id="param-DEPTH">int DEPTH = 32</text>
  <line x1="30" y1="120" x2="390.1" y2="120" class="svblock-group-sep" id="group-Outputs"/>
  <text x="210.05" y="133" class="svblock-group-label">Outputs</text>
