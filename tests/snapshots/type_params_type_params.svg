  <text x="38" y="114" text-anchor="start" class="svblock-port svblock-port-in"><title>data_in</title>data_in</text>
  <line x1="390.1" y1="148" x2="420.1" y2="148" class="svblock-pin-bus" stroke="svblock-port-out" id="port-data_out"/>
  <text x="382.1" y="152" text-anchor="end" class="svblock-port svblock-port-out"><title>data_out</title>data_out [WIDTH-1:0]</text>
</svg>